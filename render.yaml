services:
  - type: web
    name: aura-health-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate --schema=src/prisma/schema.prisma && npx prisma migrate deploy --schema=src/prisma/schema.prisma
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET_AVATARS
        value: avatars
      - key: SUPABASE_BUCKET_POSTS
        value: posts
      - key: AI_PROVIDER
        value: auto
      - key: AI_GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: AI_GEMINI_KEY_1
        sync: false
